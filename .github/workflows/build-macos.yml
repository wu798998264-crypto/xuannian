name: Build macOS package

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS DMG
    runs-on: macos-latest
    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      XUANNIAN_MAC_OUTPUT: dist-mac

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create macOS icon
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/mac/icon.iconset
          sips -z 16 16 src/xuannian-logo-256.png --out build/mac/icon.iconset/icon_16x16.png
          sips -z 32 32 src/xuannian-logo-256.png --out build/mac/icon.iconset/icon_16x16@2x.png
          sips -z 32 32 src/xuannian-logo-256.png --out build/mac/icon.iconset/icon_32x32.png
          sips -z 64 64 src/xuannian-logo-256.png --out build/mac/icon.iconset/icon_32x32@2x.png
          sips -z 128 128 src/xuannian-logo-256.png --out build/mac/icon.iconset/icon_128x128.png
          sips -z 256 256 src/xuannian-logo-256.png --out build/mac/icon.iconset/icon_128x128@2x.png
          sips -z 256 256 src/xuannian-logo-256.png --out build/mac/icon.iconset/icon_256x256.png
          sips -z 512 512 src/xuannian-logo-256.png --out build/mac/icon.iconset/icon_256x256@2x.png
          sips -z 512 512 src/xuannian-logo-256.png --out build/mac/icon.iconset/icon_512x512.png
          sips -z 1024 1024 src/xuannian-logo-256.png --out build/mac/icon.iconset/icon_512x512@2x.png
          iconutil -c icns build/mac/icon.iconset -o build/mac/icon.icns

      - name: Create macOS builder config
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const build = JSON.parse(JSON.stringify(pkg.build || {}));
          build.directories = { ...(build.directories || {}), output: process.env.XUANNIAN_MAC_OUTPUT || 'dist-mac' };
          build.files = [
            'index.html',
            'quick.html',
            'sticky.html',
            'screenshot-select.html',
            'src/**/*',
            '!src/native/*.cs',
            '!src/native/*.exe',
            '!src/xuannian-logo.png',
            'package.json',
          ];
          delete build.asarUnpack;
          delete build.extraResources;
          build.mac = {
            icon: 'build/mac/icon.icns',
            category: 'public.app-category.productivity',
            identity: '-',
            hardenedRuntime: false,
            gatekeeperAssess: false,
            target: ['dmg'],
            artifactName: 'XuanNian-${version}-${arch}.${ext}',
          };
          build.dmg = {
            artifactName: 'XuanNian-${version}-${arch}.dmg',
          };
          fs.writeFileSync('build/electron-builder.mac.generated.json', JSON.stringify(build, null, 2));
          NODE

      - name: Build macOS packages
        run: npx electron-builder --mac dmg --x64 --arm64 --publish never --config build/electron-builder.mac.generated.json

      - name: Verify macOS DMG packages
        shell: bash
        run: |
          set -euo pipefail
          for dmg in dist-mac/*.dmg; do
            hdiutil verify "$dmg"
          done

      - name: Upload macOS packages
        uses: actions/upload-artifact@v4
        with:
          name: xuannian-macos-packages
          path: |
            dist-mac/*.dmg
            dist-mac/*.blockmap
          if-no-files-found: error

      - name: Publish direct DMG downloads
        uses: softprops/action-gh-release@v2
        with:
          tag_name: xuannian-6.0.1-latest
          target_commitish: main
          name: XuanNian 6.0.1 data migration fix
          body: |
            Download the package for your system directly from this Release. Do not download the GitHub Actions artifact zip unless you specifically need the raw CI artifact.

            Windows:
            - Installer: XuanNian-6.0.1-Setup.exe
            - Portable: XuanNian-6.0.1-Portable.exe

            macOS:
            - Apple silicon M1/M2/M3/M4: XuanNian-6.0.1-arm64.dmg
            - Intel Mac: XuanNian-6.0.1-x64.dmg

            Fix in 6.0.1:
            - Restores prompts/favorites that appeared missing after the 6.0 update by using a stable data directory and merging old version data directories on startup.

            Installation:
            - Windows installer: run XuanNian-6.0.1-Setup.exe and follow the installer.
            - Windows portable: put XuanNian-6.0.1-Portable.exe in a normal folder such as Desktop or D:\Apps, then double-click it. Do not run it from inside a zip archive.
            - macOS: download the DMG matching your Mac chip, open it, drag the app to Applications, then open it from Applications.
            - If macOS says the app is damaged because it is not notarized, run: sudo xattr -rd com.apple.quarantine "/Applications/玄念6.0.1.app"

            Note: Windows SmartScreen is controlled by Microsoft reputation checks. To reduce the blue warning window, publish builds signed with a trusted OV/EV code signing certificate using the WINDOWS_CSC_LINK and WINDOWS_CSC_KEY_PASSWORD repository secrets. Unsigned builds may still be blocked on some PCs. macOS builds are ad-hoc signed but not Apple notarized.
          files: |
            dist-mac/*.dmg
          overwrite_files: true
          draft: false
          prerelease: false
          make_latest: true
