name: Release XuanNian

on:
  push:
    tags:
      - "v*.*.*"
permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows installer and portable package
    runs-on: windows-latest
    env:
      XUANNIAN_BUILD_OUTPUT: dist-win
      XUANNIAN_SKIP_HELPER_BUILD: "1"
      CSC_LINK: ${{ secrets.WINDOWS_CSC_LINK }}
      CSC_KEY_PASSWORD: ${{ secrets.WINDOWS_CSC_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Verify release version
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          if ($version -notmatch '^\d+\.\d+\.\d+$') {
            throw "package.json version must use x.y.z format, received: $version"
          }
          if ('${{ github.ref_type }}' -ne 'tag') {
            throw 'Production releases must run from a vX.Y.Z Git tag.'
          }
          if ('${{ github.ref_name }}' -ne "v$version") {
            throw "Tag ${{ github.ref_name }} does not match package version v$version"
          }
      - name: Install dependencies
        run: npm ci
      - name: Run performance regression checks
        run: npm run test:performance
      - name: Run Electron runtime endurance probe
        timeout-minutes: 5
        run: npm run test:runtime
      - name: Build Windows packages
        run: npm run dist:all
      - name: Verify Windows update metadata
        shell: pwsh
        run: |
          $version = node -p "require('./package.json').version"
          $required = @(
            "dist-win/XuanNian-$version-Setup.exe",
            "dist-win/XuanNian-$version-Portable.exe",
            "dist-win/latest.yml"
          )
          foreach ($file in $required) {
            if (-not (Test-Path -LiteralPath $file)) { throw "Missing release file: $file" }
          }
          $metadata = Get-Content -LiteralPath 'dist-win/latest.yml' -Raw
          if ($metadata -notmatch "(?m)^version:\s+$([regex]::Escape($version))\s*$") {
            throw 'latest.yml version does not match package.json.'
          }
          if ($metadata -notmatch "XuanNian-$([regex]::Escape($version))-Setup\.exe") {
            throw 'latest.yml does not point to the Windows installer.'
          }
          if ($metadata -match 'Portable\.exe') {
            throw 'latest.yml must never point installed users to the portable package.'
          }
      - uses: actions/upload-artifact@v4
        with:
          name: release-windows
          path: |
            dist-win/XuanNian-*-Setup.exe
            dist-win/XuanNian-*-Portable.exe
            dist-win/latest.yml
            dist-win/*.blockmap
          if-no-files-found: error

  build-macos:
    name: Build macOS Intel and Apple silicon packages
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Verify release version
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "package.json version must use x.y.z format, received: ${version}" >&2
            exit 1
          fi
          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo 'Production releases must run from a vX.Y.Z Git tag.' >&2
            exit 1
          fi
          if [[ "${GITHUB_REF_NAME}" != "v${version}" ]]; then
            echo "Tag ${GITHUB_REF_NAME} does not match package version v${version}" >&2
            exit 1
          fi
      - name: Install dependencies
        run: npm ci
      - name: Run performance regression checks
        run: npm run test:performance
      - name: Create macOS icon
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p build/mac/icon.iconset
          sips -z 16 16 src/xuannian-logo-256.png --out build/mac/icon.iconset/icon_16x16.png
          sips -z 32 32 src/xuannian-logo-256.png --out build/mac/icon.iconset/icon_16x16@2x.png
          sips -z 32 32 src/xuannian-logo-256.png --out build/mac/icon.iconset/icon_32x32.png
          sips -z 64 64 src/xuannian-logo-256.png --out build/mac/icon.iconset/icon_32x32@2x.png
          sips -z 128 128 src/xuannian-logo-256.png --out build/mac/icon.iconset/icon_128x128.png
          sips -z 256 256 src/xuannian-logo-256.png --out build/mac/icon.iconset/icon_128x128@2x.png
          sips -z 256 256 src/xuannian-logo-256.png --out build/mac/icon.iconset/icon_256x256.png
          sips -z 512 512 src/xuannian-logo-256.png --out build/mac/icon.iconset/icon_256x256@2x.png
          sips -z 512 512 src/xuannian-logo-256.png --out build/mac/icon.iconset/icon_512x512.png
          sips -z 1024 1024 src/xuannian-logo-256.png --out build/mac/icon.iconset/icon_512x512@2x.png
          iconutil -c icns build/mac/icon.iconset -o build/mac/icon.icns
      - name: Create macOS builder config
        shell: bash
        run: |
          set -euo pipefail
          node <<'NODE'
          const fs = require('fs');
          const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
          const build = JSON.parse(JSON.stringify(pkg.build || {}));
          build.directories = { ...(build.directories || {}), output: 'dist-mac' };
          build.files = [
            'index.html', 'quick.html', 'sticky.html', 'screenshot-select.html',
            'src/**/*', '!src/native/*.cs', '!src/native/*.exe', '!src/xuannian-logo.png', 'package.json',
          ];
          delete build.asarUnpack;
          delete build.extraResources;
          delete build.win;
          delete build.nsis;
          delete build.portable;
          build.mac = {
            icon: 'build/mac/icon.icns',
            category: 'public.app-category.productivity',
            identity: '-',
            hardenedRuntime: false,
            gatekeeperAssess: false,
            target: ['dmg', 'zip'],
            artifactName: 'XuanNian-${version}-${arch}.${ext}',
          };
          build.dmg = { artifactName: 'XuanNian-${version}-${arch}.dmg' };
          fs.writeFileSync('build/electron-builder.mac.generated.json', JSON.stringify(build, null, 2));
          NODE
      - name: Build macOS packages
        run: npx electron-builder --mac dmg zip --x64 --arm64 --publish never --config build/electron-builder.mac.generated.json
      - name: Verify macOS packages and update metadata
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          test -f dist-mac/latest-mac.yml
          test -n "$(find dist-mac -maxdepth 1 -name 'XuanNian-*-x64.dmg' -print -quit)"
          test -n "$(find dist-mac -maxdepth 1 -name 'XuanNian-*-arm64.dmg' -print -quit)"
          test -n "$(find dist-mac -maxdepth 1 -name 'XuanNian-*-x64.zip' -print -quit)"
          test -n "$(find dist-mac -maxdepth 1 -name 'XuanNian-*-arm64.zip' -print -quit)"
          grep -Eq "^version:[[:space:]]+${version}[[:space:]]*$" dist-mac/latest-mac.yml
          grep -Fq "XuanNian-${version}-x64.zip" dist-mac/latest-mac.yml
          grep -Fq "XuanNian-${version}-arm64.zip" dist-mac/latest-mac.yml
          if grep -Eqi '\.exe([[:space:]]|$)' dist-mac/latest-mac.yml; then
            echo 'latest-mac.yml must never contain Windows executables.' >&2
            exit 1
          fi
          for dmg in dist-mac/*.dmg; do hdiutil verify "$dmg"; done
      - uses: actions/upload-artifact@v4
        with:
          name: release-macos
          path: |
            dist-mac/XuanNian-*.dmg
            dist-mac/XuanNian-*.zip
            dist-mac/latest-mac.yml
            dist-mac/*.blockmap
          if-no-files-found: error

  publish:
    name: Validate and publish complete GitHub Release
    needs: [build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v4
        with:
          pattern: release-*
          path: release
          merge-multiple: true
      - name: Resolve and verify release identity
        id: meta
        shell: bash
        run: |
          set -euo pipefail
          version="$(node -p "require('./package.json').version")"
          tag="v${version}"
          if [[ ! "${version}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid package version: ${version}" >&2
            exit 1
          fi
          if [[ "${GITHUB_REF_TYPE}" != "tag" || "${GITHUB_REF_NAME}" != "${tag}" ]]; then
            echo "Release ref ${GITHUB_REF_NAME} does not match ${tag}." >&2
            exit 1
          fi
          echo "version=${version}" >> "$GITHUB_OUTPUT"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
      - name: Verify complete cross-platform asset set
        shell: bash
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          required=(
            "latest.yml"
            "latest-mac.yml"
            "XuanNian-${VERSION}-Setup.exe"
            "XuanNian-${VERSION}-Setup.exe.blockmap"
            "XuanNian-${VERSION}-Portable.exe"
            "XuanNian-${VERSION}-x64.dmg"
            "XuanNian-${VERSION}-x64.dmg.blockmap"
            "XuanNian-${VERSION}-x64.zip"
            "XuanNian-${VERSION}-x64.zip.blockmap"
            "XuanNian-${VERSION}-arm64.dmg"
            "XuanNian-${VERSION}-arm64.dmg.blockmap"
            "XuanNian-${VERSION}-arm64.zip"
            "XuanNian-${VERSION}-arm64.zip.blockmap"
          )
          for file in "${required[@]}"; do
            test -s "release/${file}" || { echo "Missing or empty release asset: ${file}" >&2; exit 1; }
          done
          mapfile -t actual < <(find release -maxdepth 1 -type f -printf '%f\n' | sort)
          if [[ "${#actual[@]}" -ne "${#required[@]}" ]]; then
            printf 'Unexpected release asset set:\n%s\n' "${actual[*]}" >&2
            exit 1
          fi
          grep -Eq "^version:[[:space:]]+${VERSION}[[:space:]]*$" release/latest.yml
          grep -Fq "XuanNian-${VERSION}-Setup.exe" release/latest.yml
          grep -Eq "^version:[[:space:]]+${VERSION}[[:space:]]*$" release/latest-mac.yml
          grep -Fq "XuanNian-${VERSION}-x64.zip" release/latest-mac.yml
          grep -Fq "XuanNian-${VERSION}-arm64.zip" release/latest-mac.yml
          printf '%s\n' "${actual[@]}"
      - name: Prepare versioned release notes
        shell: bash
        env:
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          cat > release-notes.md <<EOF
          # 玄念 ${VERSION}

          ## 普通用户下载（只需选择一个）

          | 你的设备 | 下载入口 |
          | --- | --- |
          | Windows，正常安装使用 | [Windows 安装版（推荐）](https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}/XuanNian-${VERSION}-Setup.exe) |
          | Windows，不希望安装 | [Windows 便携版](https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}/XuanNian-${VERSION}-Portable.exe) |
          | Apple silicon Mac（M1/M2/M3/M4） | [macOS Apple silicon 版](https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}/XuanNian-${VERSION}-arm64.dmg) |
          | Intel Mac | [macOS Intel 版](https://github.com/${GITHUB_REPOSITORY}/releases/download/v${VERSION}/XuanNian-${VERSION}-x64.dmg) |

          > 普通用户不需要下载 Assets 列表中的 \`latest.yml\`、\`latest-mac.yml\`、\`zip\` 或 \`blockmap\` 文件。它们是玄念自动更新功能使用的技术文件。

          更新沿用稳定的应用标识与数据目录，不会删除剪切板记录、收藏及转存附件。Windows 与 macOS 会分别读取对应的更新数据，不会跨系统下载。
          EOF
      - name: Upload as draft, verify, then publish atomically
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.meta.outputs.tag }}
          VERSION: ${{ steps.meta.outputs.version }}
        run: |
          set -euo pipefail
          if ! gh release view "${TAG}" >/dev/null 2>&1; then
            gh release create "${TAG}" --verify-tag --draft --title "玄念 ${VERSION}" --notes-file release-notes.md
          fi
          gh release upload "${TAG}" release/* --clobber
          mapfile -t uploaded < <(gh release view "${TAG}" --json assets --jq '.assets[].name' | sort)
          if [[ "${#uploaded[@]}" -ne 13 ]]; then
            printf 'Release remains unpublished: expected 13 assets, received %s.\n' "${#uploaded[@]}" >&2
            exit 1
          fi
          gh release edit "${TAG}" --title "玄念 ${VERSION}" --notes-file release-notes.md --draft=false --prerelease=false --latest
