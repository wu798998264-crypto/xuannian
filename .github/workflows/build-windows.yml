name: Build Windows package

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows installer and portable
    runs-on: windows-latest
    env:
      XUANNIAN_BUILD_OUTPUT: dist-win
      XUANNIAN_SKIP_HELPER_BUILD: "1"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Windows packages
        id: build
        continue-on-error: true
        shell: pwsh
        run: |
          npm run dist:all *>&1 | Tee-Object -FilePath windows-build-debug.log
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Prepare release files
        if: steps.build.outcome == 'success'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path release-win -Force | Out-Null
          $installer = Get-ChildItem $env:XUANNIAN_BUILD_OUTPUT -Filter '*安装包.exe' | Select-Object -First 1
          $portable = Get-ChildItem $env:XUANNIAN_BUILD_OUTPUT -Filter '*便携版.exe' | Select-Object -First 1
          if (-not $installer) { throw 'Windows installer EXE was not found.' }
          if (-not $portable) { throw 'Windows portable EXE was not found.' }
          Copy-Item -LiteralPath $installer.FullName -Destination 'release-win/XuanNian-5.0.0-Setup.exe' -Force
          Copy-Item -LiteralPath $portable.FullName -Destination 'release-win/XuanNian-5.0.0-Portable.exe' -Force
          Get-ChildItem release-win | Select-Object LastWriteTime,Length,Name | Format-Table -AutoSize
          Get-AuthenticodeSignature -FilePath 'release-win/XuanNian-5.0.0-Setup.exe' | Format-List Status,SignatureType

      - name: Upload Windows packages
        if: steps.build.outcome == 'success'
        uses: actions/upload-artifact@v4
        with:
          name: xuannian-windows-packages
          path: release-win/*.exe
          if-no-files-found: error

      - name: Publish direct Windows downloads
        if: steps.build.outcome == 'success'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: xuannian-5.0-macos-latest
          target_commitish: main
          name: XuanNian 5.0 all-platform latest
          body: |
            Download the package for your system directly. You do not need to extract GitHub Actions artifact zip files.

            Windows:
            - Installer: XuanNian-5.0.0-Setup.exe
            - Portable: XuanNian-5.0.0-Portable.exe

            macOS:
            - Apple silicon M1/M2/M3/M4: XuanNian-5.0.0-arm64.dmg
            - Intel Mac: XuanNian-5.0.0-x64.dmg

            Note: Windows builds are not signed with a paid code signing certificate, so Smart App Control may block them on some PCs. macOS builds are ad-hoc signed but not Apple notarized.
          files: release-win/*.exe
          overwrite_files: true
          draft: false
          prerelease: false
          make_latest: true

      - name: Publish Windows build debug log
        if: steps.build.outcome != 'success'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: xuannian-5.0-macos-latest
          target_commitish: main
          name: XuanNian 5.0 all-platform latest
          files: windows-build-debug.log
          overwrite_files: true
          draft: false
          prerelease: false
          make_latest: true

      - name: Fail when Windows build failed
        if: steps.build.outcome != 'success'
        shell: pwsh
        run: exit 1
