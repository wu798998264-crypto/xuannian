<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <title>Video thumbnail</title>
</head>
<body>
<script>
  const drawCoverThumbnail = (source, sourceWidth, sourceHeight, width, height) => {
    const targetWidth = Math.max(40, Math.round(Number(width) || 160));
    const targetHeight = Math.max(32, Math.round(Number(height) || 90));
    const safeSourceWidth = Math.max(1, sourceWidth || targetWidth);
    const safeSourceHeight = Math.max(1, sourceHeight || targetHeight);
    const scale = Math.max(targetWidth / safeSourceWidth, targetHeight / safeSourceHeight);
    const cropWidth = targetWidth / scale;
    const cropHeight = targetHeight / scale;
    const sourceX = Math.max(0, (safeSourceWidth - cropWidth) / 2);
    const sourceY = Math.max(0, (safeSourceHeight - cropHeight) / 2);
    const canvas = document.createElement('canvas');
    canvas.width = targetWidth;
    canvas.height = targetHeight;
    const context = canvas.getContext('2d', { alpha: false });
    context.drawImage(source, sourceX, sourceY, cropWidth, cropHeight, 0, 0, targetWidth, targetHeight);
    return canvas.toDataURL('image/jpeg', 0.82);
  };

  window.captureImageThumbnail = (source, width, height, timeoutMs) => new Promise((resolve) => {
    const image = new Image();
    let settled = false;
    const finish = (dataUrl = '') => {
      if (settled) return;
      settled = true;
      clearTimeout(timer);
      image.removeAttribute('src');
      resolve(dataUrl);
    };
    const timer = setTimeout(() => finish(''), Math.max(800, Number(timeoutMs) || 3200));
    image.addEventListener('load', () => {
      try {
        finish(drawCoverThumbnail(image, image.naturalWidth, image.naturalHeight, width, height));
      } catch {
        finish('');
      }
    }, { once: true });
    image.addEventListener('error', () => finish(''), { once: true });
    image.src = source;
  });

  window.captureVideoThumbnail = (source, width, height, timeoutMs) => new Promise((resolve) => {
    const video = document.createElement('video');
    let settled = false;
    let captureRequested = false;
    const finish = (dataUrl = '') => {
      if (settled) return;
      settled = true;
      clearTimeout(timer);
      video.removeAttribute('src');
      video.load();
      video.remove();
      resolve(dataUrl);
    };
    const capture = () => {
      if (settled || captureRequested || video.readyState < 2) return;
      captureRequested = true;
      try {
        finish(drawCoverThumbnail(video, video.videoWidth, video.videoHeight, width, height));
      } catch {
        finish('');
      }
    };
    const timer = setTimeout(() => finish(''), Math.max(800, Number(timeoutMs) || 3200));
    video.muted = true;
    video.preload = 'auto';
    video.playsInline = true;
    video.style.cssText = 'position:fixed;left:-10000px;top:-10000px;width:1px;height:1px';
    video.addEventListener('error', () => finish(''), { once: true });
    video.addEventListener('loadedmetadata', () => {
      const duration = Number.isFinite(video.duration) ? video.duration : 0;
      const seekTime = duration > 0.25 ? Math.min(1, Math.max(0.08, duration * 0.12)) : 0;
      if (seekTime > 0) video.currentTime = Math.min(seekTime, Math.max(0, duration - 0.02));
      else if (video.readyState >= 2) capture();
    }, { once: true });
    video.addEventListener('loadeddata', capture);
    video.addEventListener('seeked', capture);
    document.body.appendChild(video);
    video.src = source;
    video.load();
  });
</script>
</body>
</html>
