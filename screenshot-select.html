<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>截图</title>
  <style>
    *{box-sizing:border-box}
    html,body{width:100%;height:100%;margin:0;overflow:hidden;background:#101010;cursor:crosshair;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",Arial,sans-serif}
    #shot{position:absolute;inset:0;width:100%;height:100%;object-fit:fill;user-select:none;-webkit-user-drag:none;opacity:0}
    body.ready #shot{opacity:1}
    #mask{position:absolute;inset:0;background:rgba(0,0,0,.24);z-index:1}
    #selection{position:absolute;display:none;border:2px solid #fff;box-shadow:0 0 0 9999px rgba(0,0,0,.34),0 0 0 1px rgba(0,0,0,.35) inset;background:rgba(255,255,255,.05);z-index:2;cursor:move}
    .handle{position:absolute;width:12px;height:12px;border:2px solid #fff;background:#1e88ff;border-radius:999px}
    .handle.nw{left:-7px;top:-7px;cursor:nwse-resize}.handle.ne{right:-7px;top:-7px;cursor:nesw-resize}
    .handle.sw{left:-7px;bottom:-7px;cursor:nesw-resize}.handle.se{right:-7px;bottom:-7px;cursor:nwse-resize}
    #hint{position:fixed;left:50%;bottom:28px;transform:translateX(-50%);padding:9px 14px;border-radius:999px;background:rgba(18,18,18,.82);color:#fff;font-size:13px;letter-spacing:0;pointer-events:none;z-index:4}
    #toolbar{position:absolute;display:none;gap:8px;padding:6px;border-radius:12px;background:rgba(26,26,26,.92);box-shadow:0 12px 34px rgba(0,0,0,.32);z-index:3}
    button{width:34px;height:34px;border:0;border-radius:9px;padding:0;display:grid;place-items:center;font-weight:800;cursor:pointer}
    button svg{width:18px;height:18px;stroke:currentColor;fill:none;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
    .ok{background:#fff;color:#191919}.pin{background:#dfeeff;color:#1261c6}.cancel{background:#383838;color:#fff}
  </style>
</head>
<body>
  <img id="shot" alt="" />
  <div id="mask"></div>
  <div id="selection"><span class="handle nw" data-handle="nw"></span><span class="handle ne" data-handle="ne"></span><span class="handle sw" data-handle="sw"></span><span class="handle se" data-handle="se"></span></div>
  <div id="toolbar">
    <button class="pin" id="pinBtn" title="置顶为便签"><svg viewBox="0 0 24 24"><path d="M9 4h6"></path><path d="M10 4l1 6-4 4v2h10v-2l-4-4 1-6"></path><path d="M12 16v5"></path></svg></button>
    <button class="cancel" id="cancelBtn" title="取消"><svg viewBox="0 0 24 24"><path d="M6 6l12 12"></path><path d="M18 6 6 18"></path></svg></button>
    <button class="ok" id="okBtn" title="完成"><svg viewBox="0 0 24 24"><path d="M20 6 9 17l-5-5"></path></svg></button>
  </div>
  <div id="hint">拖拽选择截图区域，Enter 完成，Esc 取消</div>
  <script>
    const api = window.nativeAPI;
    const shot = document.getElementById('shot');
    const selection = document.getElementById('selection');
    const toolbar = document.getElementById('toolbar');
    let natural = { width: 1, height: 1 };
    let imageRect = { left: 0, top: 0, width: 1, height: 1 };
    let selectionRect = null;
    let mode = null;
    let origin = null;
    let dragOffset = null;
    let resizeAnchor = null;
    let finishing = false;
    let readySent = false;

    function notifyReady(){
      if(readySent) return;
      readySent = true;
      document.body.classList.add('ready');
      requestAnimationFrame(() => api.screenshotSelectorReady?.());
    }
    function updateImageRect(){
      imageRect = { left: 0, top: 0, width: innerWidth, height: innerHeight };
    }
    function clampPoint(event){
      updateImageRect();
      return {
        x: Math.max(imageRect.left, Math.min(event.clientX, imageRect.left + imageRect.width)),
        y: Math.max(imageRect.top, Math.min(event.clientY, imageRect.top + imageRect.height)),
      };
    }
    function normalizeRect(a, b){
      const left = Math.min(a.x, b.x);
      const top = Math.min(a.y, b.y);
      return { left, top, width: Math.abs(a.x - b.x), height: Math.abs(a.y - b.y) };
    }
    function clampRect(rect){
      updateImageRect();
      const width = Math.min(rect.width, imageRect.width);
      const height = Math.min(rect.height, imageRect.height);
      const left = Math.max(imageRect.left, Math.min(rect.left, imageRect.left + imageRect.width - width));
      const top = Math.max(imageRect.top, Math.min(rect.top, imageRect.top + imageRect.height - height));
      return { left, top, width, height };
    }
    function renderSelection(){
      if(!selectionRect) return;
      const { left, top, width, height } = selectionRect;
      selection.style.display = width > 2 && height > 2 ? 'block' : 'none';
      selection.style.left = `${left}px`;
      selection.style.top = `${top}px`;
      selection.style.width = `${width}px`;
      selection.style.height = `${height}px`;
      toolbar.style.display = width > 10 && height > 10 ? 'flex' : 'none';
      const toolbarWidth = toolbar.offsetWidth || 130;
      toolbar.style.left = `${Math.max(8, Math.min(left + width - toolbarWidth, innerWidth - toolbarWidth - 8))}px`;
      toolbar.style.top = `${Math.max(8, Math.min(top + height + 8, innerHeight - 48))}px`;
    }
    function selectedRect(){
      if(!selectionRect) return null;
      updateImageRect();
      const { left, top, width, height } = selectionRect;
      if(width < 8 || height < 8) return null;
      const sx = natural.width / imageRect.width;
      const sy = natural.height / imageRect.height;
      return {
        x: (left - imageRect.left) * sx,
        y: (top - imageRect.top) * sy,
        width: width * sx,
        height: height * sy,
      };
    }
    async function done(options = {}){
      if(finishing) return;
      const rect = selectedRect();
      if(rect){
        finishing = true;
        await api.finishScreenshotSelection({...rect, ...options});
      }
    }
    async function cancel(){
      await api.finishScreenshotSelection({ canceled: true });
    }

    api.onScreenshotSelectorInit(({ dataUrl, width, height }) => {
      natural = { width, height };
      shot.onload = notifyReady;
      shot.onerror = notifyReady;
      shot.src = dataUrl;
      updateImageRect();
      setTimeout(notifyReady, 350);
    });
    addEventListener('resize', () => { updateImageRect(); renderSelection(); });
    addEventListener('mousedown', event => {
      if(event.target.closest('button')) return;
      const point = clampPoint(event);
      const handle = event.target.closest('[data-handle]');
      if(handle && selectionRect){
        mode = 'resize';
        const h = handle.dataset.handle;
        resizeAnchor = {
          x: h.includes('e') ? selectionRect.left : selectionRect.left + selectionRect.width,
          y: h.includes('s') ? selectionRect.top : selectionRect.top + selectionRect.height,
        };
        return;
      }
      if(event.target === selection && selectionRect){
        mode = 'move';
        dragOffset = { x: point.x - selectionRect.left, y: point.y - selectionRect.top };
        return;
      }
      mode = 'draw';
      origin = point;
      selectionRect = { left: point.x, top: point.y, width: 0, height: 0 };
      renderSelection();
    });
    addEventListener('mousemove', event => {
      if(!mode) return;
      const point = clampPoint(event);
      if(mode === 'draw'){
        selectionRect = normalizeRect(origin, point);
      }else if(mode === 'move' && selectionRect){
        selectionRect = clampRect({ ...selectionRect, left: point.x - dragOffset.x, top: point.y - dragOffset.y });
      }else if(mode === 'resize' && resizeAnchor){
        selectionRect = normalizeRect(resizeAnchor, point);
      }
      renderSelection();
    });
    addEventListener('mouseup', event => {
      if(event.target.closest('button')) return;
      if(selectionRect) selectionRect = clampRect(selectionRect);
      mode = null;
      origin = null;
      dragOffset = null;
      resizeAnchor = null;
      renderSelection();
    });
    addEventListener('dblclick', done);
    addEventListener('keydown', event => {
      if(event.key === 'Escape') cancel();
      if(event.key === 'Enter') done();
    });
    document.getElementById('okBtn').onclick = () => done();
    document.getElementById('pinBtn').onclick = () => done({ pin: true });
    document.getElementById('cancelBtn').onclick = cancel;
  </script>
</body>
</html>
